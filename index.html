<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farm Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        .data-box { display: flex; justify-content: space-around; margin: 20px 0; }
        .card { padding: 15px; background: #e8f5e9; border-radius: 10px; min-width: 80px; }
        .card h3 { margin: 0; font-size: 14px; color: #666; }
        .card p { margin: 5px 0 0; font-size: 20px; font-weight: bold; color: #2e7d32; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 50px; color: white; transition: 0.3s; width: 100%; }
        .btn-on { background: #ff5252; box-shadow: 0 4px 14px rgba(255,82,82,0.4); }
        .btn-off { background: #4caf50; box-shadow: 0 4px 14px rgba(76,175,80,0.4); }
        .status-time { font-size: 12px; color: #999; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌿 Smart Farm Monitor</h2>
    <div class="status-time">อัปเดตล่าสุด: <span id="lastUpdate">-</span></div>

    <div class="data-box">
        <div class="card">
            <h3>อุณหภูมิ</h3>
            <p><span id="temp">0</span>°C</p>
        </div>
        <div class="card">
            <h3>ความชื้นอากาศ</h3>
            <p><span id="hum">0</span>%</p>
        </div>
        <div class="card">
            <h3>ความชื้นดิน</h3>
            <p><span id="soil">0</span>%</p>
        </div>
    </div>

    <hr>
    <h3>ควบคุม Buzzer</h3>
    <button id="btnBuzzer" class="btn btn-off" onclick="toggleBuzzer()">กำลังโหลด...</button>
</div>

<script>
    // --- ตั้งค่า Firebase (ใช้ข้อมูลเดียวกับใน Arduino) ---
    const firebaseConfig = {
        databaseURL: "https://jadzarov-b3839-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentBuzzerStatus = 0;

    // ดึงข้อมูลจาก Sensor
    db.ref("Sensor").on("value", (snapshot) => {
        const data = snapshot.val();
        document.getElementById("temp").innerText = data.Temperature;
        document.getElementById("hum").innerText = data.Humidity;
        document.getElementById("soil").innerText = data.SoilMoisture;
        document.getElementById("lastUpdate").innerText = data.LastUpdate;
    });

    // ดึงสถานะปุ่มกด
    db.ref("Control/Buzzer").on("value", (snapshot) => {
        currentBuzzerStatus = snapshot.val();
        const btn = document.getElementById("btnBuzzer");
        if (currentBuzzerStatus === 1) {
            btn.innerText = "ปิด Buzzer (ON)";
            btn.className = "btn btn-on";
        } else {
            btn.innerText = "เปิด Buzzer (OFF)";
            btn.className = "btn btn-off";
        }
    });

    // ฟังก์ชันกดปุ่ม
    function toggleBuzzer() {
        const newStatus = currentBuzzerStatus === 1 ? 0 : 1;
        db.ref("Control").update({ Buzzer: newStatus });
    }
</script>

</body>
</html>
