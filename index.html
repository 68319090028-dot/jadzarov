<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farm Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        .data-box { display: flex; justify-content: space-around; margin: 25px 0; gap: 10px; }
        .card { padding: 15px; background: #e8f5e9; border-radius: 12px; flex: 1; }
        .card h3 { margin: 0; font-size: 13px; color: #666; text-transform: uppercase; }
        .card p { margin: 8px 0 0; font-size: 22px; font-weight: bold; color: #2e7d32; }
        .status-time { font-size: 13px; color: #888; background: #eee; padding: 5px 15px; border-radius: 20px; display: inline-block; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .monitor-label { font-size: 14px; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌿 Smart Farm Monitor</h2>
    <div class="status-time">อัปเดตล่าสุด: <span id="lastUpdate">กำลังโหลด...</span></div>

    <div class="data-box">
        <div class="card">
            <h3>อุณหภูมิ</h3>
            <p><span id="temp">0</span>°C</p>
        </div>
        <div class="card">
            <h3>ความชื้นอากาศ</h3>
            <p><span id="hum">0</span>%</p>
        </div>
        <div class="card">
            <h3>ความชื้นดิน</h3>
            <p><span id="soil">0</span>%</p>
        </div>
    </div>
    
    <hr>
    <div class="monitor-label">ระบบทำงานอัตโนมัติตามเวลาที่กำหนด</div>
</div>

<script>
    // --- ตั้งค่า Firebase ---
    const firebaseConfig = {
        databaseURL: "https://jadzarov-b3839-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ดึงข้อมูลจาก Sensor มาแสดงผลแบบ Real-time
    db.ref("Sensor").on("value", (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById("temp").innerText = data.Temperature || "0";
            document.getElementById("hum").innerText = data.Humidity || "0";
            document.getElementById("soil").innerText = data.SoilMoisture || "0";
            document.getElementById("lastUpdate").innerText = data.LastUpdate || "-";
        }
    });
</script>

</body>
</html>
