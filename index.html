<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadzarov Smart Farm Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f4f7; text-align: center; padding: 20px; color: #2c3e50; }
        h1 { margin-bottom: 30px; color: #34495e; }
        
        .dashboard { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); width: 200px; transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); }
        
        .title { font-size: 1.1rem; color: #7f8c8d; margin-bottom: 10px; font-weight: 600; }
        .value { font-size: 2.5rem; font-weight: bold; }
        
        #temp-card { border-top: 8px solid #ff4757; }
        #humid-card { border-top: 8px solid #3498db; }
        #soil-card { border-top: 8px solid #2ecc71; }
        
        /* Control Panel Styles */
        .control-panel { background: white; padding: 30px; border-radius: 25px; display: inline-block; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-top: 8px solid #f1c40f; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        
        .btn { padding: 15px 35px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 12px; color: white; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .btn-on { background-color: #2ecc71; box-shadow: 0 4px #27ae60; }
        .btn-on:active { box-shadow: 0 0 #27ae60; transform: translateY(4px); }
        
        .btn-off { background-color: #e74c3c; box-shadow: 0 4px #c0392b; }
        .btn-off:active { box-shadow: 0 0 #c0392b; transform: translateY(4px); }
        
        .status-box { margin-top: 20px; padding: 10px; border-radius: 10px; background: #f8f9fa; font-size: 1rem; }
        #buzzer-status { font-weight: bold; }
    </style>
</head>
<body>

    <h1>🌿 Jadzarov Smart Farm</h1>
    
    <div class="dashboard">
        <div class="card" id="temp-card">
            <div class="title">🌡️ อุณหภูมิ</div>
            <div class="value"><span id="temp">--</span>°C</div>
        </div>
        <div class="card" id="humid-card">
            <div class="title">💧 ความชื้นอากาศ</div>
            <div class="value"><span id="humid">--</span>%</div>
        </div>
        <div class="card" id="soil-card">
            <div class="title">🌱 ความชื้นดิน</div>
            <div class="value"><span id="soil">--</span>%</div>
        </div>
    </div>

    <div class="control-panel">
        <div class="title">📢 ควบคุม BUZZER</div>
        <div class="btn-group">
            <button class="btn btn-on" onclick="controlBuzzer(1)">เปิดเสียง</button>
            <button class="btn btn-off" onclick="controlBuzzer(0)">ปิดเสียง</button>
        </div>
        <div class="status-box">
            สถานะลำโพง: <span id="buzzer-status">กำลังโหลด...</span>
        </div>
    </div>

    <script>
        // กำหนดค่า Firebase ของคุณ
        const firebaseConfig = {
            databaseURL: "https://jadzarov-b3839-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. รับค่าเซนเซอร์
        database.ref('Sensor').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('temp').innerText = data.Temperature || '--';
                document.getElementById('humid').innerText = data.Humidity || '--';
                document.getElementById('soil').innerText = data.SoilMoisture || '--';
            }
        });

        // 2. รับสถานะ 
        database.ref('Control/Buzzer').on('value', (snapshot) => {
            const status = snapshot.val();
            const display = document.getElementById('buzzer-status');
            if (status === 1) {
                display.innerText = "กำลังทำงาน (ON)";
                display.style.color = "#2ecc71";
            } else {
                display.innerText = "ปิดการทำงาน (OFF)";
                display.style.color = "#e74c3c";
            }
        });

        // 3. ฟังก์ชันสั่งงาน
        function controlBuzzer(value) {
            database.ref('Control').update({
                Buzzer: value
            }).catch(error => {
                alert("เกิดข้อผิดพลาด: " + error.message);
            });
        }
    </script>
</body>
</html>
