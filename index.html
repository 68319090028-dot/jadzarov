<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Jadzarov Smart Farm Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f4f7; text-align: center; padding: 40px; }
        .dashboard { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); width: 220px; }
        .title { font-size: 1.2rem; color: #555; margin-bottom: 15px; }
        .value { font-size: 2.8rem; font-weight: bold; color: #2c3e50; }
        #temp-card { border-top: 8px solid #ff4757; }
        #humid-card { border-top: 8px solid #3498db; }
        #soil-card { border-top: 8px solid #2ecc71; }
        
        /* สไตล์สำหรับปุ่มควบคุม */
        .control-panel { margin-top: 30px; background: white; padding: 20px; border-radius: 20px; display: inline-block; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .btn { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 10px; color: white; transition: 0.3s; }
        .btn-on { background-color: #2ecc71; margin-right: 10px; }
        .btn-on:hover { background-color: #27ae60; }
        .btn-off { background-color: #e74c3c; }
        .btn-off:hover { background-color: #c0392b; }
        .status-text { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>ระบบติดตามเซนเซอร์ (Jadzarov)</h1>
    
    <div class="dashboard">
        <div class="card" id="temp-card">
            <div class="title">อุณหภูมิ</div>
            <div class="value"><span id="temp">--</span>°C</div>
        </div>
        <div class="card" id="humid-card">
            <div class="title">ความชื้นอากาศ</div>
            <div class="value"><span id="humid">--</span>%</div>
        </div>
        <div class="card" id="soil-card">
            <div class="title">ความชื้นดิน</div>
            <div class="value"><span id="soil">--</span>%</div>
        </div>
    </div>

    <div class="control-panel">
        <div class="title">ควบคุม Buzzer</div>
        <button class="btn btn-on" onclick="controlBuzzer(1)">เปิดเสียง</button>
        <button class="btn btn-off" onclick="controlBuzzer(0)">ปิดเสียง</button>
        <div class="status-text">สถานะปัจจุบัน: <span id="buzzer-status">--</span></div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://jadzarov-b3839-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. ดึงข้อมูลเซนเซอร์มาแสดงผล
        database.ref('Sensor').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('temp').innerText = data.Temperature;
                document.getElementById('humid').innerText = data.Humidity;
                document.getElementById('soil').innerText = data.SoilMoisture;
            }
        });

        // 2. ดึงสถานะ Buzzer มาแสดงผล
        database.ref('Control/Buzzer').on('value', (snapshot) => {
            const status = snapshot.val();
            const statusText = document.getElementById('buzzer-status');
            if (status === 1) {
                statusText.innerText = "เปิด (ON)";
                statusText.style.color = "#2ecc71";
            } else {
                statusText.innerText = "ปิด (OFF)";
                statusText.style.color = "#e74c3c";
            }
        });

        // 3. ฟังก์ชันส่งค่าไปที่ Firebase เมื่อกดปุ่ม
        function controlBuzzer(value) {
            database.ref('Control').update({
                Buzzer: value
            });
        }
    </script>
</body>
</html>
